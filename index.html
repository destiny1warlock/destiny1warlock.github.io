<!DOCTYPE  html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>RobotShop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #006666;
    }
    h1 {
      text-align:center;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 800px;
      margin: auto;
    }
    .product {
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .product img {
      width: 100%;
      max-height: 120px;
      object-fit: contain;
    }
    button {
      padding: 10px 15px;
      background: #666033;
      color: white;
      border: 1;
      border-radius: 4px;
      cursor: pointer;
    }
    .cart {
      max-width: 800px;
      margin: 40px auto;
      background: #00ffff;
      padding: 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>🤖 	RobotShop</h1>

<div class="products" id="products"></div>

<div class="cart">
  <h2>🛒 Handlekurv</h2>
  <ul id="cart"></ul>
  <p><strong>Total:</strong> <span id="total">0</span> kr</p>
  <button onclick="checkout()">Bestill</button>

</div>

<script>
  const products = [
    { id: 1, name: "Robot hund", price: 309, image:"bilder/robot-1.webp", color: "#336600" },
    { id: 2, name: "Robot hånd", price: 1299, image:"bilder/robot-2.webp", color: "#3300FF"  },
    { id: 3, name: "Humanoid robot", price: 799, image:"bilder/robot-3.webp", color: "#336699"  },
    { id: 4, name: "Robot Special Edition", price: 2999, image:"bilder/robot-4.jpg", color: "#336699"  }
  ];

  const productContainer = document.getElementById("products");
  const cartList = document.getElementById("cart");
  const totalEl = document.getElementById("total");

  function renderProducts() {
    products.forEach(p => {
      const div = document.createElement("div");
	div.className = "product";
	div.style.backgroundColor = p.color;
      	div.className = "product";
     	div.innerHTML = `
         <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>${p.price} kr</p>
        <button onclick="addToCart(${p.id})">Legg i handlekurv</button>
      `;
      productContainer.appendChild(div);
    });
  }

  function getCart() {
    return JSON.parse(localStorage.getItem("cart")) || [];
  }

  function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
  }

  function addToCart(id) {
    const cart = getCart();
    const product = products.find(p => p.id === id);
    cart.push(product);
    saveCart(cart);
    renderCart();
  }

  function renderCart() {
    const cart = getCart();
    cartList.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
      const li = document.createElement("li");
      li.textContent = `${item.name} – ${item.price} kr`;
      cartList.appendChild(li);
      total += item.price;
    });

    totalEl.textContent = total;
  }

  function checkout() {
    if (getCart().length === 0) {
      alert("Handlekurven er tom");
      return;
    }
    alert("Bestilling sendt! (klar for Stripe / PayPal)");
    localStorage.removeItem("cart");
    renderCart();
  }

  renderProducts();
  renderCart();
</script>

</body>
</html>
